<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cili Boh System v1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-[#e0e5ec] flex items-center justify-center h-screen overflow-hidden">

    <div class="relative bg-[#e0e5ec] w-full h-full max-w-[450px] shadow-2xl overflow-hidden flex flex-col">
        
        <header class="p-6 text-center">
            <h1 class="text-xl font-bold text-gray-700">CILI BOH SYSTEM</h1>
            <p id="current-view-title" class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Dashboard</p>
        </header>

        <main class="flex-1 px-6 pb-24 overflow-y-auto custom-scroll">
            
            <!-- VIEW: DASHBOARD -->
            <section id="view-dashboard" class="app-view space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="neu-card p-4"><span class="text-[9px] text-gray-400 font-bold uppercase">Sales</span><p id="stat-sales" class="text-lg font-bold">RM 0</p></div>
                    <div class="neu-card p-4"><span class="text-[9px] text-gray-400 font-bold uppercase">Profit</span><p id="stat-profit" class="text-lg font-bold text-green-600">RM 0</p></div>
                </div>
                <div class="neu-card p-4">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-3">Pesanan Terkini</h3>
                    <div id="recent-orders-list" class="space-y-3"></div>
                </div>
            </section>

            <!-- VIEW: ORDER FORM -->
            <section id="view-order" class="app-view hidden space-y-4">
                <div class="neu-card p-5 space-y-4">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-bold text-gray-400 uppercase">Pelanggan</label>
                    <button onclick="toggleNewCust()" class="text-[10px] text-blue-500 font-bold">+ BARU</button></div>
                    
                    <div id="new-cust-box" class="hidden space-y-2 p-3 bg-white/30 rounded-xl">
                        <input id="nc-name" class="neu-input w-full" placeholder="Nama Kedai">
                        <select id="nc-cat" class="neu-input w-full"><option value="Retail">Retail</option><option value="Kilang">Kilang</option></select>
                        <input id="nc-phone" class="neu-input w-full" placeholder="601...">
                        <button onclick="submitCustomer()" class="neu-btn w-full py-2 text-xs bg-blue-500 text-white font-bold">SIMPAN</button>
                    </div>

                    <select id="input-customer" class="neu-input w-full" onchange="updatePrice()"></select>
                    <select id="input-product" class="neu-input w-full" onchange="updatePrice()"></select>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="input-qty" class="neu-input w-full" value="1" oninput="updatePrice()">
                        <input type="number" id="input-paid" class="neu-input w-full" placeholder="Deposit">
                    </div>

                    <div class="flex justify-between items-center px-1">
    <label class="text-[10px] font-bold text-gray-400 uppercase">Pelanggan</label>
    <!-- Tambah ini: Indikator Kategori -->
    <span id="cust-tier-badge" class="text-[9px] font-bold text-blue-500 uppercase">TIER: -</span>
</div>
<select id="input-customer" class="neu-input w-full" onchange="updatePrice()"></select>
                    <div class="neu-card p-3 flex justify-between bg-white/20"><span class="text-xs font-bold">TOTAL:</span><span id="display-total" class="font-bold text-red-500">RM 0.00</span></div>
                    <button onclick="submitOrder()" class="neu-btn-primary w-full py-4 font-bold uppercase text-sm">Hantar Order</button>
                </div>
            </section>

            <!-- VIEW: TRACKING -->
            <section id="view-tracking" class="app-view hidden space-y-4" id="tracking-list"></section>

            <!-- VIEW: REPORT -->
            <section id="view-report" class="app-view hidden space-y-4">
                <div class="neu-card p-5 space-y-4">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase">Perbelanjaan</h3>
                    <select id="exp-cat" class="neu-input w-full"><option>Cili Kering</option><option>Gaji</option><option>Utiliti</option></select>
                    <input id="exp-amt" type="number" class="neu-input w-full" placeholder="Amaun RM">
                    <button onclick="submitExpense()" class="neu-btn w-full py-3 font-bold text-gray-600">SIMPAN KOS</button>
                </div>
            </section>

        </main>

        <nav class="absolute bottom-0 w-full h-20 bg-[#e0e5ec] flex items-center justify-around border-t border-white/20">
            <button onclick="switchView('dashboard')" class="nav-btn active" id="nav-dashboard">🏠</button>
            <button onclick="switchView('order')" class="nav-btn" id="nav-order">➕</button>
            <button onclick="switchView('tracking')" class="nav-btn" id="nav-tracking">🚚</button>
            <button onclick="switchView('report')" class="nav-btn" id="nav-report">📊</button>
        </nav>
    </div>

    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
